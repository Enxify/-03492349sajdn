<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Battle Bal; Sim</title>
    <style>
        body { background: #0f0f13; color: #e0e0e0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; display: flex; margin: 0; height: 100vh; overflow: hidden; }
        
        /* Sidebar Styles */
        #sidebar { width: 380px; background: #16161c; padding: 20px; overflow-y: auto; border-right: 3px solid #333; z-index: 10; display: flex; flex-direction: column; gap: 15px; box-shadow: 5px 0 20px rgba(0,0,0,0.8); }
        .panel { background: #1f1f27; padding: 15px; border-radius: 8px; border-top: 3px solid #5c5cff; }
        .panel h3 { margin: 0 0 15px 0; font-size: 1.1rem; text-transform: uppercase; color: #fff; letter-spacing: 1px; border-bottom: 1px solid #333; padding-bottom: 5px; }
        .p1-panel { border-top-color: #ff3366; }
        .p2-panel { border-top-color: #00ccff; }
        .control-group { margin-bottom: 12px; }
        label { display: block; font-size: 0.75rem; font-weight: bold; color: #aaa; margin-bottom: 4px; text-transform: uppercase; }
        input[type="range"] { width: 100%; cursor: pointer; accent-color: #fff; }
        .v { float: right; color: #fff; font-family: monospace; font-size: 0.9rem; }
        button { width: 100%; padding: 15px; background: #5c5cff; border: none; color: white; font-weight: 900; cursor: pointer; border-radius: 6px; font-size: 1rem; transition: 0.2s; text-transform: uppercase; }
        button:hover { background: #7a7aff; transform: translateY(-2px); }
        button.danger { background: #ff3366; margin-top: 10px; }
        button.danger:hover { background: #ff5c85; }

        /* Arena Styles */
        #container { flex-grow: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; background: #0a0a0d; position: relative; }
        canvas { background: radial-gradient(circle at center, #1a1a24 0%, #000 100%); border: 4px solid #333; border-radius: 12px; box-shadow: 0 20px 60px rgba(0,0,0,0.8); }
        #announcer { position: absolute; top: 30px; font-size: 3rem; font-weight: 900; pointer-events: none; text-shadow: 0 0 20px rgba(0,0,0,1); z-index: 5; text-transform: uppercase; }

        /* Menu Overlay */
        #menu-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 100; backdrop-filter: blur(10px); }
        .menu-box { background: #16161c; padding: 40px; border-radius: 15px; border: 2px solid #5c5cff; text-align: center; box-shadow: 0 0 50px rgba(92, 92, 255, 0.3); width: 600px; }
        .menu-box h1 { font-size: 2.5rem; margin: 0 0 10px 0; color: #fff; text-shadow: 0 0 10px #5c5cff; }
        .menu-box p { color: #aaa; margin-bottom: 30px; }
        .matchup-row { display: flex; justify-content: space-between; gap: 20px; margin-bottom: 30px; }
        .fighter-select { flex: 1; background: #1f1f27; padding: 20px; border-radius: 8px; border-top: 4px solid #555; }
        .fighter-select.p1 { border-top-color: #ff3366; }
        .fighter-select.p2 { border-top-color: #00ccff; }
        select { width: 100%; padding: 12px; background: #111; color: #fff; border: 1px solid #444; border-radius: 4px; font-size: 1.1rem; font-weight: bold; cursor: pointer; outline: none; }
        select:hover { border-color: #777; }
    </style>
</head>
<body>

<div id="sidebar">
    <div id="sidebar-content"></div>
    <button class="danger" onclick="showMenu()">END MATCH / MENU</button>
</div>

<div id="container">
    <div id="announcer"></div>
    <canvas id="arena" width="1000" height="800"></canvas>

    <div id="menu-overlay">
        <div class="menu-box">
            <h1>CHOOSE YOUR FIGHTERS</h1>
            <p>Choose Your Fighter</p>
            
            <div class="matchup-row">
                <div class="fighter-select p1">
                    <h3 style="color: #ff3366; margin-top:0;">PLAYER 1 (RED)</h3>
                    <select id="sel-p1"></select>
                </div>
                <div class="fighter-select p2">
                    <h3 style="color: #00ccff; margin-top:0;">PLAYER 2 (BLUE)</h3>
                    <select id="sel-p2"></select>
                </div>
            </div>
            
            <button onclick="startMatch()" style="font-size: 1.5rem; padding: 20px;">START BATTLE</button>
        </div>
    </div>
</div>

<script>
const canvas = document.getElementById('arena');
const ctx = canvas.getContext('2d');
const announcer = document.getElementById('announcer');
const sidebarContent = document.getElementById('sidebar-content');
const menuOverlay = document.getElementById('menu-overlay');

// ==========================================
// 1. ROSTER & CHARACTER DEFINITIONS
// ==========================================
// We use a generalized hitbox and drawing system to support 12 distinct characters compactly.
const ROSTER = {
    sword: {
        name: "Knight (Greatsword)",
        desc: "Balanced range and damage.",
        customSliders: [
            { id: 'slen', name: 'Blade Length', min: 100, max: 400, val: 220 },
            { id: 'sdmg', name: 'Slash Damage', min: 1, max: 30, val: 12 }
        ],
        draw: (ctx, r, cfg, c1) => drawWeapon(ctx, r, cfg.slen, 18, c1, 'sword'),
        hitboxes: (cfg, r) => [{ type: 'line', l: cfg.slen, w: 18, dmg: cfg.sdmg, knock: 1.5, offset: 0 }]
    },
    daggers: {
        name: "Rogue (Dual Daggers)",
        desc: "Two fast, short blades.",
        customSliders: [
            { id: 'slen', name: 'Dagger Length', min: 40, max: 150, val: 90 },
            { id: 'sdmg', name: 'Stab Damage', min: 1, max: 20, val: 6 }
        ],
        draw: (ctx, r, cfg, c1) => { drawWeapon(ctx, r, cfg.slen, 12, c1, 'sword'); ctx.rotate(Math.PI); drawWeapon(ctx, r, cfg.slen, 12, c1, 'sword'); },
        hitboxes: (cfg, r) => [
            { type: 'line', l: cfg.slen, w: 12, dmg: cfg.sdmg, knock: 0.8, offset: 0 },
            { type: 'line', l: cfg.slen, w: 12, dmg: cfg.sdmg, knock: 0.8, offset: Math.PI }
        ]
    },
    hammer: {
        name: "Brute (Warhammer)",
        desc: "Massive knockback, slow spin.",
        customSliders: [
            { id: 'slen', name: 'Handle Length', min: 100, max: 350, val: 180 },
            { id: 'sdmg', name: 'Crush Damage', min: 5, max: 50, val: 20 }
        ],
        draw: (ctx, r, cfg, c1) => drawWeapon(ctx, r, cfg.slen, 25, c1, 'hammer'),
        hitboxes: (cfg, r) => [{ type: 'line', l: cfg.slen, w: 40, dmg: cfg.sdmg, knock: 4.0, offset: 0 }]
    },
    spear: {
        name: "Vanguard (Spear)",
        desc: "Maximum reach, precise hitbox.",
        customSliders: [
            { id: 'slen', name: 'Shaft Length', min: 200, max: 600, val: 320 },
            { id: 'sdmg', name: 'Pierce Damage', min: 1, max: 40, val: 15 }
        ],
        draw: (ctx, r, cfg, c1) => drawWeapon(ctx, r, cfg.slen, 10, c1, 'spear'),
        hitboxes: (cfg, r) => [{ type: 'line', l: cfg.slen, w: 10, dmg: cfg.sdmg, knock: 1.2, offset: 0 }]
    },
    scythe: {
        name: "Reaper (Scythe)",
        desc: "Pulls enemies inward on hit.",
        customSliders: [
            { id: 'slen', name: 'Shaft Length', min: 150, max: 400, val: 240 },
            { id: 'sdmg', name: 'Reap Damage', min: 1, max: 30, val: 14 }
        ],
        draw: (ctx, r, cfg, c1) => drawWeapon(ctx, r, cfg.slen, 14, c1, 'scythe'),
        hitboxes: (cfg, r) => [{ type: 'line', l: cfg.slen, w: 20, dmg: cfg.sdmg, knock: -1.5, offset: 0 }] // Negative knockback pulls!
    },
    axe: {
        name: "Berserker (Battle Axe)",
        desc: "Heavy double-sided strikes.",
        customSliders: [
            { id: 'slen', name: 'Handle Length', min: 100, max: 300, val: 160 },
            { id: 'sdmg', name: 'Cleave Damage', min: 1, max: 40, val: 18 }
        ],
        draw: (ctx, r, cfg, c1) => drawWeapon(ctx, r, cfg.slen, 16, c1, 'axe'),
        hitboxes: (cfg, r) => [{ type: 'line', l: cfg.slen, w: 50, dmg: cfg.sdmg, knock: 2.5, offset: 0 }]
    },
    mace: {
        name: "Gladiator (Flail)",
        desc: "Spiked ball on a chain.",
        customSliders: [
            { id: 'slen', name: 'Chain Length', min: 80, max: 250, val: 150 },
            { id: 'sdmg', name: 'Impact Damage', min: 1, max: 35, val: 16 }
        ],
        draw: (ctx, r, cfg, c1) => drawWeapon(ctx, r, cfg.slen, 8, c1, 'mace'),
        hitboxes: (cfg, r) => [{ type: 'point', dist: cfg.slen, size: 30, dmg: cfg.sdmg, knock: 2.0, offset: 0 }]
    },
    shield: {
        name: "Defender (Greatshield)",
        desc: "Massive defense, low damage.",
        customSliders: [
            { id: 'swidth', name: 'Shield Arc', min: 40, max: 120, val: 80 },
            { id: 'sdmg', name: 'Bash Damage', min: 1, max: 15, val: 5 }
        ],
        draw: (ctx, r, cfg, c1) => drawWeapon(ctx, r, r+20, cfg.swidth, c1, 'shield'),
        hitboxes: (cfg, r) => [{ type: 'arc', dist: r+10, w: cfg.swidth, dmg: cfg.sdmg, knock: 3.5, offset: 0 }]
    },
    ninja: {
        name: "Ninja (Shuriken Orbit)",
        desc: "Orbiting projectiles.",
        customSliders: [
            { id: 'slen', name: 'Orbit Radius', min: 100, max: 300, val: 180 },
            { id: 'sdmg', name: 'Shred Damage', min: 1, max: 20, val: 8 }
        ],
        draw: (ctx, r, cfg, c1) => drawWeapon(ctx, r, cfg.slen, 20, c1, 'shuriken'),
        hitboxes: (cfg, r) => [{ type: 'point', dist: cfg.slen, size: 20, dmg: cfg.sdmg, knock: 1.0, offset: 0 }]
    },
    mage: {
        name: "Wizard (Magic Orb)",
        desc: "Heavy magic damage at a distance.",
        customSliders: [
            { id: 'slen', name: 'Orbit Radius', min: 100, max: 400, val: 220 },
            { id: 'sdmg', name: 'Spell Damage', min: 5, max: 45, val: 25 }
        ],
        draw: (ctx, r, cfg, c1) => drawWeapon(ctx, r, cfg.slen, 35, c1, 'orb'),
        hitboxes: (cfg, r) => [{ type: 'point', dist: cfg.slen, size: 35, dmg: cfg.sdmg, knock: 1.5, offset: 0 }]
    },
    monk: {
        name: "Monk (Bo Staff)",
        desc: "Strikes evenly on both sides.",
        customSliders: [
            { id: 'slen', name: 'Staff Length', min: 150, max: 400, val: 250 },
            { id: 'sdmg', name: 'Strike Damage', min: 1, max: 25, val: 10 }
        ],
        draw: (ctx, r, cfg, c1) => { drawWeapon(ctx, r, cfg.slen, 14, c1, 'staff'); ctx.rotate(Math.PI); drawWeapon(ctx, r, cfg.slen, 14, c1, 'staff'); },
        hitboxes: (cfg, r) => [
            { type: 'line', l: cfg.slen, w: 14, dmg: cfg.sdmg, knock: 1.5, offset: 0 },
            { type: 'line', l: cfg.slen, w: 14, dmg: cfg.sdmg, knock: 1.5, offset: Math.PI }
        ]
    },
    king: {
        name: "King (Crown of Life)",
        desc: "Heals instead of dealing weapon damage.",
        customSliders: [
            { id: 'heal', name: 'Aura Heal Power', min: 1, max: 30, val: 15 }
        ],
        draw: (ctx, r, cfg, c1) => drawWeapon(ctx, r, 0, 0, c1, 'crown'),
        hitboxes: (cfg, r) => [] // Crown has no attack hitbox, it's passive defense
    }
};

// ==========================================
// 2. PROCEDURAL DRAWING ENGINE
// ==========================================
function drawWeapon(ctx, r, len, w, color, type) {
    ctx.fillStyle = "#fff";
    
    if (type === 'sword') {
        ctx.fillStyle = "#444"; ctx.fillRect(r - 10, -w, 12, w*2); // Guard
        let grad = ctx.createLinearGradient(r, -w/2, r, w/2);
        grad.addColorStop(0,"#ddd"); grad.addColorStop(0.5,"#777"); grad.addColorStop(1,"#ddd");
        ctx.fillStyle = grad;
        ctx.beginPath(); ctx.moveTo(r, -w/2); ctx.lineTo(len-20, -w/2); ctx.lineTo(len, 0); ctx.lineTo(len-20, w/2); ctx.lineTo(r, w/2); ctx.fill();
    } 
    else if (type === 'hammer') {
        ctx.fillStyle = "#5c4033"; ctx.fillRect(r, -6, len-r, 12); // Shaft
        ctx.fillStyle = "#888"; ctx.fillRect(len-30, -w, 40, w*2); // Head
    }
    else if (type === 'spear') {
        ctx.fillStyle = "#5c4033"; ctx.fillRect(r, -4, len-r-30, 8); // Shaft
        ctx.fillStyle = "#eee"; ctx.beginPath(); ctx.moveTo(len-30, -w); ctx.lineTo(len, 0); ctx.lineTo(len-30, w); ctx.fill(); // Tip
    }
    else if (type === 'scythe') {
        ctx.fillStyle = "#222"; ctx.fillRect(r, -5, len-r, 10); // Shaft
        ctx.fillStyle = "#eee"; ctx.beginPath(); ctx.moveTo(len-10, -5); ctx.lineTo(len-10, -w*3); ctx.lineTo(len-40, -5); ctx.fill(); // Blade
    }
    else if (type === 'axe') {
        ctx.fillStyle = "#5c4033"; ctx.fillRect(r, -6, len-r, 12); // Shaft
        ctx.fillStyle = "#bbb"; ctx.beginPath(); ctx.moveTo(len-20, -10); ctx.lineTo(len-10, -w*1.5); ctx.lineTo(len+10, -w*1.5); ctx.lineTo(len, -10); ctx.fill();
        ctx.beginPath(); ctx.moveTo(len-20, 10); ctx.lineTo(len-10, w*1.5); ctx.lineTo(len+10, w*1.5); ctx.lineTo(len, 10); ctx.fill();
    }
    else if (type === 'mace') {
        ctx.strokeStyle = "#888"; ctx.lineWidth=3; ctx.beginPath(); ctx.moveTo(r,0); ctx.lineTo(len,0); ctx.stroke(); // Chain
        ctx.fillStyle = "#444"; ctx.beginPath(); ctx.arc(len, 0, 15, 0, Math.PI*2); ctx.fill(); // Ball
        ctx.fillStyle = "#fff"; for(let i=0; i<8; i++) { ctx.beginPath(); ctx.arc(len + Math.cos(i)*18, Math.sin(i)*18, 3, 0, Math.PI*2); ctx.fill(); } // Spikes
    }
    else if (type === 'shield') {
        ctx.strokeStyle = color; ctx.lineWidth = 15; ctx.lineCap = "round";
        ctx.beginPath(); ctx.arc(0, 0, len, -w * Math.PI/180, w * Math.PI/180); ctx.stroke();
    }
    else if (type === 'shuriken') {
        ctx.save(); ctx.translate(len, 0); ctx.rotate(Date.now()*0.01);
        ctx.fillStyle = "#aaa"; ctx.beginPath(); ctx.moveTo(0, -20); ctx.lineTo(5, -5); ctx.lineTo(20, 0); ctx.lineTo(5, 5); ctx.lineTo(0, 20); ctx.lineTo(-5, 5); ctx.lineTo(-20, 0); ctx.lineTo(-5, -5); ctx.fill();
        ctx.restore();
    }
    else if (type === 'orb') {
        ctx.fillStyle = color; ctx.shadowBlur = 20; ctx.shadowColor = color;
        ctx.beginPath(); ctx.arc(len, 0, w, 0, Math.PI*2); ctx.fill(); ctx.shadowBlur = 0;
        ctx.fillStyle = "#fff"; ctx.beginPath(); ctx.arc(len-w/3, -w/3, w/4, 0, Math.PI*2); ctx.fill();
    }
    else if (type === 'staff') {
        ctx.fillStyle = "#d2b48c"; ctx.fillRect(r, -w/2, len-r, w);
        ctx.fillStyle = "#gold"; ctx.fillRect(len-20, -w/2-2, 20, w+4);
    }
    else if (type === 'crown') {
        ctx.translate(0, -r - 10); ctx.rotate(-Math.PI/2); // upright
        ctx.fillStyle = "#FFD700"; ctx.beginPath();
        ctx.moveTo(-20, 0); ctx.lineTo(-20, -15); ctx.lineTo(-10, -5); ctx.lineTo(0, -20); ctx.lineTo(10, -5); ctx.lineTo(20, -15); ctx.lineTo(20, 0); ctx.fill();
    }
}

// ==========================================
// 3. UI AND STATE MANAGEMENT
// ==========================================
let GLOBAL_CFG = { grav: 0.6, bounce: 0.8, minEnergy: 12, maxV: 60, size: 60, mass: 40, bdmg: 5 };
let p1Cfg = {}; let p2Cfg = {};
let f1, f2;
let matchActive = false;

// Populate Dropdowns
Object.keys(ROSTER).forEach(key => {
    let opt1 = document.createElement('option'); opt1.value = key; opt1.innerText = ROSTER[key].name;
    let opt2 = document.createElement('option'); opt2.value = key; opt2.innerText = ROSTER[key].name;
    if (key === 'king') opt2.selected = true; // Default match
    document.getElementById('sel-p1').appendChild(opt1);
    document.getElementById('sel-p2').appendChild(opt2);
});

function createSlider(container, id, name, min, max, val, objRef) {
    objRef[id] = val;
    let div = document.createElement('div'); div.className = 'control-group';
    div.innerHTML = `<label>${name} <span class="v" id="v-${id}">${val}</span></label>
                     <input type="range" id="in-${id}" min="${min}" max="${max}" step="${(max-min)>20?1:0.1}" value="${val}">`;
    container.appendChild(div);
    div.querySelector('input').oninput = (e) => {
        let v = parseFloat(e.target.value);
        objRef[id] = v;
        document.getElementById(`v-${id}`).innerText = v;
    };
}

function buildSidebar(p1Key, p2Key) {
    sidebarContent.innerHTML = ''; // Clear

    // Global Panel
    let gPanel = document.createElement('div'); gPanel.className = 'panel'; gPanel.innerHTML = '<h3>Global Arena Physics</h3>';
    createSlider(gPanel, 'grav', 'Gravity', 0, 3, GLOBAL_CFG.grav, GLOBAL_CFG);
    createSlider(gPanel, 'minEnergy', 'Min Bounce Energy', 5, 40, GLOBAL_CFG.minEnergy, GLOBAL_CFG);
    createSlider(gPanel, 'mass', 'Collision Knockback', 10, 100, GLOBAL_CFG.mass, GLOBAL_CFG);
    createSlider(gPanel, 'bdmg', 'Body-Bump Damage', 0, 20, GLOBAL_CFG.bdmg, GLOBAL_CFG);
    sidebarContent.appendChild(gPanel);

    // Player 1 Panel
    let p1Data = ROSTER[p1Key];
    let p1Panel = document.createElement('div'); p1Panel.className = 'panel p1-panel'; p1Panel.innerHTML = `<h3 style="color:#ff3366">${p1Data.name}</h3>`;
    createSlider(p1Panel, 'spin', 'Spin Speed', 0.05, 1.0, 0.3, p1Cfg);
    p1Data.customSliders.forEach(s => createSlider(p1Panel, s.id, s.name, s.min, s.max, s.val, p1Cfg));
    sidebarContent.appendChild(p1Panel);

    // Player 2 Panel
    let p2Data = ROSTER[p2Key];
    let p2Panel = document.createElement('div'); p2Panel.className = 'panel p2-panel'; p2Panel.innerHTML = `<h3 style="color:#00ccff">${p2Data.name}</h3>`;
    createSlider(p2Panel, 'spin', 'Spin Speed', 0.05, 1.0, 0.3, p2Cfg);
    p2Data.customSliders.forEach(s => createSlider(p2Panel, s.id, s.name, s.min, s.max, s.val, p2Cfg));
    sidebarContent.appendChild(p2Panel);
}

function showMenu() {
    menuOverlay.style.display = 'flex';
    matchActive = false;
}

function startMatch() {
    let key1 = document.getElementById('sel-p1').value;
    let key2 = document.getElementById('sel-p2').value;
    
    p1Cfg = {}; p2Cfg = {}; // Reset configs
    buildSidebar(key1, key2);

    f1 = new Fighter(200, 400, "#900", "#f36", key1, p1Cfg);
    f2 = new Fighter(800, 400, "#006", "#0cf", key2, p2Cfg);

    menuOverlay.style.display = 'none';
    announcer.innerText = "FIGHT!";
    announcer.style.color = "#fff";
    matchActive = true;
}

// ==========================================
// 4. PHYSICS & ENTITY ENGINE
// ==========================================
class Fighter {
    constructor(x, y, cDark, cLight, classKey, configObj) {
        this.x = x; this.y = y;
        this.vx = (Math.random()-0.5)*50;
        this.vy = (Math.random()-0.5)*50;
        this.cDark = cDark; this.cLight = cLight;
        this.key = classKey;
        this.cfg = configObj;
        this.data = ROSTER[classKey];
        this.hp = 150;
        this.angle = 0;
        this.spinDir = 1;
    }

    update() {
        this.vy += GLOBAL_CFG.grav;
        this.x += this.vx; this.y += this.vy;

        // Speed Cap
        let speed = Math.sqrt(this.vx**2 + this.vy**2);
        if (speed > GLOBAL_CFG.maxV) { this.vx = (this.vx/speed)*GLOBAL_CFG.maxV; this.vy = (this.vy/speed)*GLOBAL_CFG.maxV; }

        // THE KINETIC FLOOR NUDGE (Anti-Stuck Logic)
        const r = GLOBAL_CFG.size;
        const b = GLOBAL_CFG.bounce;
        const minE = GLOBAL_CFG.minEnergy;

        if (this.x < r) { this.x = r; this.vx = Math.max(Math.abs(this.vx)*b, minE); }
        if (this.x > canvas.width - r) { this.x = canvas.width - r; this.vx = -Math.max(Math.abs(this.vx)*b, minE); }
        
        if (this.y < r) { this.y = r; this.vy = Math.max(Math.abs(this.vy)*b, minE); }
        if (this.y > canvas.height - r) { 
            this.y = canvas.height - r; 
            // Crucial: Guarantee upward velocity never falls below minEnergy
            this.vy = -Math.max(Math.abs(this.vy)*b, minE); 
        }

        this.angle += this.cfg.spin * this.spinDir;
    }

    draw() {
        const r = GLOBAL_CFG.size;
        
        // Body
        let grad = ctx.createRadialGradient(this.x - r/3, this.y - r/3, r/8, this.x, this.y, r);
        grad.addColorStop(0, this.cLight); grad.addColorStop(1, this.cDark);
        ctx.fillStyle = grad;
        ctx.beginPath(); ctx.arc(this.x, this.y, r, 0, Math.PI*2); ctx.fill();
        ctx.strokeStyle = "rgba(255,255,255,0.2)"; ctx.lineWidth = 3; ctx.stroke();

        // HP
        ctx.fillStyle = "#fff"; ctx.font = `bold ${r/2.5}px Arial`; ctx.textAlign = "center";
        ctx.fillText(Math.floor(this.hp), this.x, this.y + r/6);

        // Weapon
        ctx.save();
        ctx.translate(this.x, this.y);
        ctx.rotate(this.angle);
        this.data.draw(ctx, r, this.cfg, this.cLight);
        ctx.restore();
    }
}

// Distance from point to line segment
function distToSegment(px, py, x1, y1, x2, y2) {
    let l2 = (x2-x1)**2 + (y2-y1)**2;
    if (l2 == 0) return { d: Math.sqrt((px-x1)**2 + (py-y1)**2), cx: x1, cy: y1 };
    let t = Math.max(0, Math.min(1, ((px-x1)*(x2-x1) + (py-y1)*(y2-y1)) / l2));
    let cx = x1 + t*(x2-x1); let cy = y1 + t*(y2-y1);
    return { d: Math.sqrt((px-cx)**2 + (py-cy)**2), cx, cy };
}

function handleCollisions() {
    const r = GLOBAL_CFG.size;
    
    // Body vs Body
    let dx = f2.x - f1.x; let dy = f2.y - f1.y;
    let dist = Math.sqrt(dx*dx + dy*dy);
    if (dist < r * 2) {
        let ang = Math.atan2(dy, dx);
        let push = (r*2 - dist)/2;
        f1.x -= Math.cos(ang)*push; f1.y -= Math.sin(ang)*push;
        f2.x += Math.cos(ang)*push; f2.y += Math.sin(ang)*push;
        
        f1.vx -= Math.cos(ang) * (GLOBAL_CFG.mass/5); f1.vy -= Math.sin(ang) * (GLOBAL_CFG.mass/5);
        f2.vx += Math.cos(ang) * (GLOBAL_CFG.mass/5); f2.vy += Math.sin(ang) * (GLOBAL_CFG.mass/5);
        
        f1.hp -= GLOBAL_CFG.bdmg; f2.hp -= GLOBAL_CFG.bdmg;
        if(f1.cfg.heal) f1.hp += f1.cfg.heal; // Passive heal
        if(f2.cfg.heal) f2.hp += f2.cfg.heal;
    }

    // Weapon vs Body Checks
    function resolveWeapon(attacker, defender) {
        let boxes = attacker.data.hitboxes(attacker.cfg, r);
        let hit = false;

        for(let b of boxes) {
            let actualAngle = attacker.angle + b.offset;
            
            if (b.type === 'line') {
                let x1 = attacker.x + Math.cos(actualAngle)*r; let y1 = attacker.y + Math.sin(actualAngle)*r;
                let x2 = attacker.x + Math.cos(actualAngle)*b.l; let y2 = attacker.y + Math.sin(actualAngle)*b.l;
                let res = distToSegment(defender.x, defender.y, x1, y1, x2, y2);
                if (res.d < r + b.w/2) { hit = true; triggerImpact(attacker, defender, res.cx, res.cy, b); break; }
            } 
            else if (b.type === 'point') {
                let px = attacker.x + Math.cos(actualAngle)*b.dist; let py = attacker.y + Math.sin(actualAngle)*b.dist;
                let pd = Math.sqrt((defender.x-px)**2 + (defender.y-py)**2);
                if (pd < r + b.size/2) { hit = true; triggerImpact(attacker, defender, px, py, b); break; }
            }
            else if (b.type === 'arc') {
                let angToDef = Math.atan2(defender.y - attacker.y, defender.x - attacker.x);
                let diff = Math.abs(angToDef - actualAngle);
                if (diff > Math.PI) diff = Math.PI*2 - diff;
                let ddist = Math.sqrt((defender.x-attacker.x)**2 + (defender.y-attacker.y)**2);
                if (diff < (b.w*Math.PI/180) && Math.abs(ddist - b.dist) < r) {
                    hit = true; triggerImpact(attacker, defender, defender.x, defender.y, b); break; 
                }
            }
        }
        if(hit) attacker.spinDir *= -1; // Bounce weapon
    }

    function triggerImpact(att, def, ix, iy, boxProps) {
        def.hp -= boxProps.dmg;
        if(att.cfg.heal) att.hp += att.cfg.heal;
        
        let impactAngle = Math.atan2(def.y - iy, def.x - ix);
        let force = GLOBAL_CFG.mass * boxProps.knock;
        def.vx += Math.cos(impactAngle) * force;
        def.vy += Math.sin(impactAngle) * force;
    }

    resolveWeapon(f1, f2);
    resolveWeapon(f2, f1);
}

function run() {
    ctx.fillStyle = "#0a0a0d"; 
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    
    // Grid
    ctx.strokeStyle = "#1a1a24"; ctx.lineWidth = 2;
    for(let i=0; i<canvas.width; i+=60) { ctx.beginPath(); ctx.moveTo(i, 0); ctx.lineTo(i, canvas.height); ctx.stroke(); }
    for(let i=0; i<canvas.height; i+=60) { ctx.beginPath(); ctx.moveTo(0, i); ctx.lineTo(canvas.width, i); ctx.stroke(); }

    if (matchActive) {
        handleCollisions();
        f1.update(); f1.draw();
        f2.update(); f2.draw();

        // Caps
        if(f1.hp > 250) f1.hp = 250; if(f2.hp > 250) f2.hp = 250;

        // Win Condition
        if ((f1.hp <= 0 || f2.hp <= 0) && matchActive) {
            matchActive = false;
            let p1Wins = f1.hp > 0;
            announcer.innerText = p1Wins ? "RED VICTORIOUS" : "BLUE VICTORIOUS";
            announcer.style.color = p1Wins ? f1.cLight : f2.cLight;
        }
    }

    requestAnimationFrame(run);
}

run(); // Start render loop
</script>
