<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Battle Ball Simulator</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #0f0f23 0%, #1a1a3e 100%);
            color: #e0e0e0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /* Sidebar */
        #sidebar {
            width: 400px;
            background: rgba(20, 20, 40, 0.95);
            backdrop-filter: blur(10px);
            padding: 20px;
            overflow-y: auto;
            border-right: 2px solid #5c5cff;
            display: flex;
            flex-direction: column;
            gap: 15px;
            box-shadow: 5px 0 30px rgba(92, 92, 255, 0.2);
        }

        .panel {
            background: rgba(30, 30, 50, 0.8);
            padding: 15px;
            border-radius: 8px;
            border-left: 4px solid #5c5cff;
            backdrop-filter: blur(5px);
        }

        .panel h3 {
            margin: 0 0 12px 0;
            font-size: 0.95rem;
            text-transform: uppercase;
            color: #fff;
            letter-spacing: 1px;
            border-bottom: 1px solid #5c5cff;
            padding-bottom: 8px;
        }

        .control-group {
            margin-bottom: 12px;
        }

        label {
            display: block;
            font-size: 0.75rem;
            font-weight: bold;
            color: #aaa;
            margin-bottom: 4px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        input[type="range"] {
            width: 100%;
            cursor: pointer;
            accent-color: #5c5cff;
            height: 6px;
        }

        .value-display {
            float: right;
            color: #5c5cff;
            font-family: monospace;
            font-size: 0.9rem;
            font-weight: bold;
        }

        button {
            width: 100%;
            padding: 12px;
            background: #5c5cff;
            border: none;
            color: white;
            font-weight: bold;
            cursor: pointer;
            border-radius: 6px;
            font-size: 0.95rem;
            transition: 0.2s;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        button:hover {
            background: #7a7aff;
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(92, 92, 255, 0.4);
        }

        button.danger {
            background: #ff3366;
            margin-top: auto;
        }

        button.danger:hover {
            background: #ff5c85;
            box-shadow: 0 5px 20px rgba(255, 51, 102, 0.4);
        }

        /* Arena */
        #container {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #0a0a1a 0%, #1a0a2e 100%);
            position: relative;
        }

        canvas {
            background: radial-gradient(circle at center, #1a1a3a 0%, #000 100%);
            border: 4px solid #5c5cff;
            border-radius: 12px;
            box-shadow: 0 20px 60px rgba(92, 92, 255, 0.3), 0 0 30px rgba(92, 92, 255, 0.1);
            max-width: 100%;
            max-height: 100%;
        }

        #announcer {
            position: absolute;
            top: 40px;
            font-size: 3.5rem;
            font-weight: 900;
            pointer-events: none;
            text-shadow: 0 0 30px rgba(92, 92, 255, 0.8);
            z-index: 5;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        /* Menu Overlay */
        #menu-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.9);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 100;
            backdrop-filter: blur(10px);
        }

        .menu-box {
            background: rgba(20, 20, 50, 0.95);
            padding: 40px;
            border-radius: 15px;
            border: 2px solid #5c5cff;
            text-align: center;
            box-shadow: 0 0 50px rgba(92, 92, 255, 0.4);
            width: 95%;
            max-width: 700px;
            backdrop-filter: blur(10px);
        }

        .menu-box h1 {
            font-size: 2.5rem;
            margin: 0 0 10px 0;
            color: #fff;
            text-shadow: 0 0 15px #5c5cff;
        }

        .menu-box p {
            color: #aaa;
            margin-bottom: 30px;
        }

        .matchup-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 30px;
        }

        .fighter-select {
            background: rgba(30, 30, 50, 0.8);
            padding: 20px;
            border-radius: 8px;
            border-top: 4px solid #555;
        }

        .fighter-select.p1 {
            border-top-color: #ff3366;
        }

        .fighter-select.p2 {
            border-top-color: #00ccff;
        }

        .fighter-select h3 {
            margin-top: 0;
            margin-bottom: 12px;
            font-size: 0.9rem;
        }

        .fighter-select p {
            font-size: 0.8rem;
            color: #888;
            margin-top: 8px;
        }

        select {
            width: 100%;
            padding: 10px;
            background: #111;
            color: #fff;
            border: 1px solid #444;
            border-radius: 4px;
            font-size: 0.95rem;
            font-weight: bold;
            cursor: pointer;
            outline: none;
        }

        select:hover {
            border-color: #777;
        }

        .fighter-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(80px, 1fr));
            gap: 8px;
            margin-top: 20px;
        }

        .fighter-grid button {
            padding: 8px;
            font-size: 0.7rem;
            background: rgba(92, 92, 255, 0.3);
            border: 1px solid #5c5cff;
        }

        .fighter-grid button:hover {
            background: #5c5cff;
        }

        ::-webkit-scrollbar {
            width: 8px;
        }

        ::-webkit-scrollbar-track {
            background: rgba(0, 0, 0, 0.3);
        }

        ::-webkit-scrollbar-thumb {
            background: #5c5cff;
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #7a7aff;
        }

        .fighter-desc {
            font-size: 0.75rem;
            color: #aaa;
            margin-top: 8px;
            font-style: italic;
        }
    </style>
</head>
<body>

<div id="sidebar">
    <div id="sidebar-content"></div>
    <button class="danger" onclick="showMenu()">END MATCH / MENU</button>
</div>

<div id="container">
    <div id="announcer"></div>
    <canvas id="arena" width="1400" height="900"></canvas>

    <div id="menu-overlay">
        <div class="menu-box">
            <h1>CHOOSE YOUR FIGHTERS</h1>
            <p>Battle Ball Simulator</p>
            
            <div class="matchup-row">
                <div class="fighter-select p1">
                    <h3 style="color: #ff3366;">PLAYER 1 (RED)</h3>
                    <select id="sel-p1"></select>
                    <p id="desc-p1" class="fighter-desc"></p>
                </div>
                <div class="fighter-select p2">
                    <h3 style="color: #00ccff;">PLAYER 2 (CYAN)</h3>
                    <select id="sel-p2"></select>
                    <p id="desc-p2" class="fighter-desc"></p>
                </div>
            </div>
            
            <button onclick="startMatch()" style="font-size: 1.2rem; padding: 18px;">START BATTLE</button>
        </div>
    </div>
</div>

<script>
const canvas = document.getElementById('arena');
const ctx = canvas.getContext('2d');
const announcer = document.getElementById('announcer');
const sidebarContent = document.getElementById('sidebar-content');
const menuOverlay = document.getElementById('menu-overlay');

const ROSTER = {
    knight: {
        name: "Knight (Greatsword)",
        desc: "Balanced range and damage.",
        defaultConfig: { slen: 220, sdmg: 12 },
        size: 30
    },
    assassin: {
        name: "Assassin (Dual Daggers)",
        desc: "Two fast, short blades. Slightly smaller.",
        defaultConfig: { slen: 90, sdmg: 6 },
        size: 25
    },
    viking: {
        name: "Viking (Battle Axe)",
        desc: "Increases spin speed by 5% on each hit.",
        defaultConfig: { slen: 180, sdmg: 20 },
        size: 30
    },
    vanguard: {
        name: "Vanguard (Spear)",
        desc: "Maximum reach, drags enemies toward you.",
        defaultConfig: { slen: 320, sdmg: 8 },
        size: 30
    },
    reaper: {
        name: "Reaper (Scythe)",
        desc: "Gains lifesteal with each hit.",
        defaultConfig: { slen: 240, sdmg: 14 },
        size: 30
    },
    berserker: {
        name: "Berserker (Throwing Axe)",
        desc: "Throws axes at enemies at high speed.",
        defaultConfig: { sdmg: 30 },
        size: 30
    },
    gladiator: {
        name: "Gladiator (Flail)",
        desc: "Swinging chain with gravity effect. Critical damage.",
        defaultConfig: { slen: 150, sdmg: 30 },
        size: 30
    },
    defender: {
        name: "Defender (Greatshield)",
        desc: "Massive defense. Smaller shield.",
        defaultConfig: { swidth: 60, sdmg: 5 },
        size: 30
    },
    ninja: {
        name: "Ninja (Shuriken Burst)",
        desc: "Throws 3 shurikens in bursts.",
        defaultConfig: { slen: 180, sdmg: 8 },
        size: 30
    },
    wizard: {
        name: "Wizard (Magic Staff)",
        desc: "Shoots lightning. Charges up with hits.",
        defaultConfig: { slen: 220, sdmg: 25 },
        size: 30
    },
    monk: {
        name: "Monk (Bo Staff)",
        desc: "Smaller weapons. Teleports behind enemy every 10s.",
        defaultConfig: { slen: 150, sdmg: 8 },
        size: 30
    },
    king: {
        name: "King (Crown of Life)",
        desc: "Only body collision. Heals when crown is hit.",
        defaultConfig: { heal: 15 },
        size: 40
    }
};

let GLOBAL_CFG = {
    grav: 0.4,
    bounce: 0.7,
    minEnergy: 15,
    maxV: 70,
    mass: 80,
    bdmg: 8,
    attraction: 0.15
};
let p1Cfg = {};
let p2Cfg = {};
let f1, f2;
let matchActive = false;
let isPaused = false;
let gameSpeed = 1;

Object.keys(ROSTER).forEach(key => {
    let opt1 = document.createElement('option');
    opt1.value = key;
    opt1.innerText = ROSTER[key].name;
    let opt2 = document.createElement('option');
    opt2.value = key;
    opt2.innerText = ROSTER[key].name;
    if (key === 'king') opt2.selected = true;
    document.getElementById('sel-p1').appendChild(opt1);
    document.getElementById('sel-p2').appendChild(opt2);
});

// Update descriptions
document.getElementById('sel-p1').addEventListener('change', (e) => {
    document.getElementById('desc-p1').innerText = ROSTER[e.target.value].desc;
});
document.getElementById('sel-p2').addEventListener('change', (e) => {
    document.getElementById('desc-p2').innerText = ROSTER[e.target.value].desc;
});
document.getElementById('desc-p1').innerText = ROSTER['knight'].desc;
document.getElementById('desc-p2').innerText = ROSTER['king'].desc;

function createSlider(container, id, name, min, max, val, objRef) {
    objRef[id] = val;
    let div = document.createElement('div');
    div.className = 'control-group';
    let step = (max - min) > 20 ? 1 : 0.1;
    let displayVal = typeof val === 'number' ? (step < 1 ? val.toFixed(2) : Math.round(val)) : val;
    div.innerHTML = `<label>${name} <span class="value-display" id="v-${id}">${displayVal}</span></label>
                     <input type="range" id="in-${id}" min="${min}" max="${max}" step="${step}" value="${val}">`;
    container.appendChild(div);
    div.querySelector('input').oninput = (e) => {
        let v = parseFloat(e.target.value);
        objRef[id] = v;
        let display = step < 1 ? v.toFixed(2) : Math.round(v);
        document.getElementById(`v-${id}`).innerText = display;
    };
}

function buildSidebar(p1Key, p2Key) {
    sidebarContent.innerHTML = '';

    let gPanel = document.createElement('div');
    gPanel.className = 'panel';
    gPanel.innerHTML = '<h3>Arena Physics</h3>';
    createSlider(gPanel, 'grav', 'Gravity', 0, 2, GLOBAL_CFG.grav, GLOBAL_CFG);
    createSlider(gPanel, 'attraction', 'Attraction', 0, 0.5, GLOBAL_CFG.attraction, GLOBAL_CFG);
    createSlider(gPanel, 'mass', 'Knockback', 40, 150, GLOBAL_CFG.mass, GLOBAL_CFG);
    createSlider(gPanel, 'bounce', 'Bounce', 0.3, 0.95, GLOBAL_CFG.bounce, GLOBAL_CFG);
    createSlider(gPanel, 'bdmg', 'Body Damage', 0, 20, GLOBAL_CFG.bdmg, GLOBAL_CFG);
    sidebarContent.appendChild(gPanel);

    let p1Data = ROSTER[p1Key];
    let p1Panel = document.createElement('div');
    p1Panel.className = 'panel';
    p1Panel.innerHTML = `<h3 style="border-bottom-color: #ff3366; color:#ff3366">${p1Data.name}</h3>`;
    createSlider(p1Panel, 'spin', 'Spin Speed', 0.05, 1.0, 0.3, p1Cfg);
    if (p1Data.defaultConfig.slen) createSlider(p1Panel, 'slen', 'Range', Math.max(50, p1Data.defaultConfig.slen - 100), p1Data.defaultConfig.slen + 100, p1Data.defaultConfig.slen, p1Cfg);
    if (p1Data.defaultConfig.sdmg) createSlider(p1Panel, 'sdmg', 'Damage', Math.max(1, p1Data.defaultConfig.sdmg - 10), p1Data.defaultConfig.sdmg + 20, p1Data.defaultConfig.sdmg, p1Cfg);
    if (p1Data.defaultConfig.swidth) createSlider(p1Panel, 'swidth', 'Shield Arc', 40, 120, p1Data.defaultConfig.swidth, p1Cfg);
    if (p1Data.defaultConfig.heal) createSlider(p1Panel, 'heal', 'Heal Power', 5, 30, p1Data.defaultConfig.heal, p1Cfg);
    sidebarContent.appendChild(p1Panel);

    let p2Data = ROSTER[p2Key];
    let p2Panel = document.createElement('div');
    p2Panel.className = 'panel';
    p2Panel.innerHTML = `<h3 style="border-bottom-color: #00ccff; color:#00ccff">${p2Data.name}</h3>`;
    createSlider(p2Panel, 'spin', 'Spin Speed', 0.05, 1.0, 0.3, p2Cfg);
    if (p2Data.defaultConfig.slen) createSlider(p2Panel, 'slen', 'Range', Math.max(50, p2Data.defaultConfig.slen - 100), p2Data.defaultConfig.slen + 100, p2Data.defaultConfig.slen, p2Cfg);
    if (p2Data.defaultConfig.sdmg) createSlider(p2Panel, 'sdmg', 'Damage', Math.max(1, p2Data.defaultConfig.sdmg - 10), p2Data.defaultConfig.sdmg + 20, p2Data.defaultConfig.sdmg, p2Cfg);
    if (p2Data.defaultConfig.swidth) createSlider(p2Panel, 'swidth', 'Shield Arc', 40, 120, p2Data.defaultConfig.swidth, p2Cfg);
    if (p2Data.defaultConfig.heal) createSlider(p2Panel, 'heal', 'Heal Power', 5, 30, p2Data.defaultConfig.heal, p2Cfg);
    sidebarContent.appendChild(p2Panel);

    let ctrlPanel = document.createElement('div');
    ctrlPanel.className = 'panel';
    ctrlPanel.innerHTML = '<h3>Battle Controls</h3>';
    
    let pauseBtn = document.createElement('button');
    pauseBtn.innerHTML = 'PAUSE';
    pauseBtn.style.marginBottom = '10px';
    pauseBtn.onclick = () => {
        isPaused = !isPaused;
        pauseBtn.innerHTML = isPaused ? 'RESUME' : 'PAUSE';
        pauseBtn.style.background = isPaused ? '#ff9500' : '#5c5cff';
    };
    ctrlPanel.appendChild(pauseBtn);

    let speedDiv = document.createElement('div');
    speedDiv.className = 'control-group';
    speedDiv.innerHTML = `<label>Speed: <span class="value-display" id="speed-val">1.0x</span></label>
                          <input type="range" min="0.25" max="2" step="0.25" value="1" id="speed-slider">`;
    speedDiv.querySelector('#speed-slider').oninput = (e) => {
        gameSpeed = parseFloat(e.target.value);
        document.getElementById('speed-val').innerText = gameSpeed.toFixed(2) + 'x';
    };
    ctrlPanel.appendChild(speedDiv);
    sidebarContent.appendChild(ctrlPanel);
}

function showMenu() {
    menuOverlay.style.display = 'flex';
    matchActive = false;
}

function startMatch() {
    let key1 = document.getElementById('sel-p1').value;
    let key2 = document.getElementById('sel-p2').value;
    
    p1Cfg = Object.assign({}, ROSTER[key1].defaultConfig);
    p2Cfg = Object.assign({}, ROSTER[key2].defaultConfig);
    p1Cfg.spin = 0.3;
    p2Cfg.spin = 0.3;
    buildSidebar(key1, key2);

    f1 = new Fighter(250, 400, "#900", "#f36", key1, p1Cfg, ROSTER[key1].size);
    f2 = new Fighter(canvas.width - 250, 400, "#006", "#0cf", key2, p2Cfg, ROSTER[key2].size);

    menuOverlay.style.display = 'none';
    announcer.innerText = "FIGHT!";
    announcer.style.color = "#fff";
    matchActive = true;
    isPaused = false;
}

class Fighter {
    constructor(x, y, cDark, cLight, classKey, configObj, size) {
        this.x = x;
        this.y = y;
        this.vx = (Math.random() - 0.5) * 50;
        this.vy = (Math.random() - 0.5) * 50;
        this.cDark = cDark;
        this.cLight = cLight;
        this.key = classKey;
        this.cfg = configObj;
        this.size = size;
        this.hp = 150;
        this.maxHp = classKey === 'king' ? 200 : 150;
        if (classKey === 'king') this.hp = 200;
        this.angle = 0;
        this.spinDir = 1;
        this.spinSpeed = 0.3;
        this.lifeStealMultiplier = 0;
        this.lastTeleportTime = 0;
        this.lastThrowTime = 0;
        this.thrownAxes = [];
        this.chainAngle = 0;
        this.chainSwingDir = 1;
        this.wizardChargeLevel = 0;
        this.lastChargeTime = 0;
        this.shurikens = [];
        this.lastShurikenTime = 0;
    }

    update() {
        this.vy += GLOBAL_CFG.grav;
        this.x += this.vx;
        this.y += this.vy;

        // Gravity towards each other
        if (f1 && f2) {
            let other = this === f1 ? f2 : f1;
            let dx = other.x - this.x;
            let dy = other.y - this.y;
            let dist = Math.sqrt(dx * dx + dy * dy);
            if (dist > 0) {
                this.vx += (dx / dist) * GLOBAL_CFG.attraction;
                this.vy += (dy / dist) * GLOBAL_CFG.attraction;
            }
        }

        let speed = Math.sqrt(this.vx ** 2 + this.vy ** 2);
        if (speed > GLOBAL_CFG.maxV) {
            this.vx = (this.vx / speed) * GLOBAL_CFG.maxV;
            this.vy = (this.vy / speed) * GLOBAL_CFG.maxV;
        }

        const b = GLOBAL_CFG.bounce;
        const minE = GLOBAL_CFG.minEnergy;

        if (this.x < this.size) {
            this.x = this.size;
            this.vx = Math.max(Math.abs(this.vx) * b, minE);
        }
        if (this.x > canvas.width - this.size) {
            this.x = canvas.width - this.size;
            this.vx = -Math.max(Math.abs(this.vx) * b, minE);
        }
        if (this.y < this.size) {
            this.y = this.size;
            this.vy = Math.max(Math.abs(this.vy) * b, minE);
        }
        if (this.y > canvas.height - this.size) {
            this.y = canvas.height - this.size;
            this.vy = -Math.max(Math.abs(this.vy) * b, minE);
        }

        this.angle += this.cfg.spin * this.spinDir;

        if (this.key === 'reaper') {
            this.lifeStealMultiplier *= 0.98;
        }
        if (this.key === 'berserker') {
            this.thrownAxes = this.thrownAxes.filter(a => {
                a.x += a.vx * 0.016;
                a.y += a.vy * 0.016;
                return Date.now() - a.createdAt < 1000;
            });
        }
        if (this.key === 'gladiator') {
            this.chainAngle += this.chainSwingDir * 0.02;
            if (this.chainAngle > Math.PI / 3) this.chainSwingDir = -1;
            else if (this.chainAngle < -Math.PI / 3) this.chainSwingDir = 1;
        }
        if (this.key === 'wizard') {
            if (Date.now() - this.lastChargeTime > 5000) {
                this.wizardChargeLevel = 0;
            }
        }
    }

    draw() {
        let grad = ctx.createRadialGradient(this.x - this.size / 3, this.y - this.size / 3, this.size / 8, this.x, this.y, this.size);
        grad.addColorStop(0, this.cLight);
        grad.addColorStop(1, this.cDark);
        ctx.fillStyle = grad;
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
        ctx.fill();
        ctx.strokeStyle = "rgba(255,255,255,0.2)";
        ctx.lineWidth = 3;
        ctx.stroke();

        ctx.fillStyle = "#fff";
        ctx.font = `bold ${this.size / 2}px Arial`;
        ctx.textAlign = "center";
        ctx.textBaseline = "middle";
        ctx.fillText(Math.floor(this.hp).toString(), this.x, this.y);

        ctx.save();
        ctx.translate(this.x, this.y);
        ctx.rotate(this.angle);
        this.drawWeapon();
        ctx.restore();

        if (this.key === 'king') {
            ctx.save();
            ctx.translate(this.x, this.y - this.size - 15);
            ctx.fillStyle = "#FFD700";
            ctx.beginPath();
            ctx.moveTo(-20, 0);
            ctx.lineTo(-20, -20);
            ctx.lineTo(-10, -5);
            ctx.lineTo(0, -25);
            ctx.lineTo(10, -5);
            ctx.lineTo(20, -20);
            ctx.lineTo(20, 0);
            ctx.fill();
            ctx.restore();
        }

        // HP bar
        let hpPercent = Math.max(0, this.hp / this.maxHp);
        ctx.fillStyle = "#333";
        ctx.fillRect(this.x - 40, this.y - this.size - 25, 80, 8);
        let color = hpPercent > 0.5 ? "#00ff00" : hpPercent > 0.25 ? "#ffff00" : "#ff0000";
        ctx.fillStyle = color;
        ctx.fillRect(this.x - 40, this.y - this.size - 25, 80 * hpPercent, 8);
        ctx.strokeStyle = "#fff";
        ctx.lineWidth = 1;
        ctx.strokeRect(this.x - 40, this.y - this.size - 25, 80, 8);
    }

    drawWeapon() {
        const r = this.size;
        const len = this.cfg.slen || 220;
        const w = this.cfg.sdmg || 12;

        if (this.key === 'knight') {
            ctx.fillStyle = "#444";
            ctx.fillRect(r - 10, -8, 12, 16);
            let grad = ctx.createLinearGradient(r, -8, r, 8);
            grad.addColorStop(0, "#ddd");
            grad.addColorStop(0.5, "#777");
            grad.addColorStop(1, "#ddd");
            ctx.fillStyle = grad;
            ctx.beginPath();
            ctx.moveTo(r, -8);
            ctx.lineTo(len - 20, -8);
            ctx.lineTo(len, 0);
            ctx.lineTo(len - 20, 8);
            ctx.lineTo(r, 8);
            ctx.fill();
        } else if (this.key === 'assassin') {
            ctx.fillStyle = "#ddd";
            ctx.fillRect(r, -6, len - r, 12);
        } else if (this.key === 'viking') {
            ctx.fillStyle = "#5c4033";
            ctx.fillRect(r, -6, len - r, 12);
            ctx.fillStyle = "#bbb";
            ctx.beginPath();
            ctx.moveTo(len - 20, -10);
            ctx.lineTo(len - 10, -30);
            ctx.lineTo(len + 10, -30);
            ctx.lineTo(len, -10);
            ctx.fill();
        } else if (this.key === 'vanguard') {
            ctx.fillStyle = "#5c4033";
            ctx.fillRect(r, -4, len - r - 30, 8);
            ctx.fillStyle = "#eee";
            ctx.beginPath();
            ctx.moveTo(len - 30, -12);
            ctx.lineTo(len, 0);
            ctx.lineTo(len - 30, 12);
            ctx.fill();
        } else if (this.key === 'gladiator') {
            ctx.strokeStyle = "#888";
            ctx.lineWidth = 3;
            ctx.beginPath();
            ctx.moveTo(r, 0);
            let chainLen = this.cfg.slen || 150;
            ctx.quadraticCurveTo(Math.cos(this.chainAngle) * chainLen * 0.5, Math.sin(this.chainAngle) * chainLen * 0.5, Math.cos(this.chainAngle) * chainLen, Math.sin(this.chainAngle) * chainLen);
            ctx.stroke();
            ctx.fillStyle = "#444";
            ctx.beginPath();
            ctx.arc(Math.cos(this.chainAngle) * chainLen, Math.sin(this.chainAngle) * chainLen, 20, 0, Math.PI * 2);
            ctx.fill();
        } else if (this.key === 'ninja') {
            ctx.save();
            ctx.translate(r + 50, 0);
            ctx.rotate(Date.now() * 0.01);
            ctx.fillStyle = "#aaa";
            ctx.beginPath();
            ctx.moveTo(0, -12);
            ctx.lineTo(5, -5);
            ctx.lineTo(12, 0);
            ctx.lineTo(5, 5);
            ctx.lineTo(0, 12);
            ctx.lineTo(-5, 5);
            ctx.lineTo(-12, 0);
            ctx.lineTo(-5, -5);
            ctx.fill();
            ctx.restore();
        } else if (this.key === 'wizard') {
            ctx.fillStyle = "#d2b48c";
            ctx.fillRect(r, -8, len - r, 16);
            ctx.fillStyle = "#FFD700";
            ctx.beginPath();
            ctx.arc(len, 0, 15 + this.wizardChargeLevel * 3, 0, Math.PI * 2);
            ctx.fill();
        } else if (this.key === 'monk') {
            ctx.fillStyle = "#d2b48c";
            ctx.fillRect(r, -8, len - r, 16);
        }
    }

    getHitboxes() {
        const len = this.cfg.slen || 220;
        const dmg = this.cfg.sdmg || 12;
        
        switch (this.key) {
            case 'knight':
                return [{ type: 'line', l: len, w: 18, dmg, knock: 1.5, offset: 0 }];
            case 'assassin':
                return [
                    { type: 'line', l: len, w: 12, dmg, knock: 0.8, offset: 0 },
                    { type: 'line', l: len, w: 12, dmg, knock: 0.8, offset: Math.PI }
                ];
            case 'viking':
                return [{ type: 'line', l: len, w: 50, dmg, knock: 2.5, offset: 0 }];
            case 'vanguard':
                return [{ type: 'line', l: len, w: 10, dmg, knock: 3.5, offset: 0 }];
            case 'reaper':
                return [{ type: 'line', l: len, w: 20, dmg, knock: -1.5, offset: 0 }];
            case 'berserker':
                return [];
            case 'gladiator':
                return [{ type: 'point', dist: len, size: 30, dmg, knock: 3, offset: this.chainAngle }];
            case 'defender':
                return [{ type: 'arc', dist: this.size + 10, w: this.cfg.swidth || 60, dmg, knock: 3.5, offset: 0 }];
            case 'ninja':
                return [];
            case 'wizard':
                return [{ type: 'point', dist: len, size: dmg, dmg: Math.floor(dmg * (1 + this.wizardChargeLevel * 2)), knock: 1.5, offset: 0 }];
            case 'monk':
                return [
                    { type: 'line', l: len, w: 10, dmg, knock: 1.5, offset: 0 },
                    { type: 'line', l: len, w: 10, dmg, knock: 1.5, offset: Math.PI }
                ];
            case 'king':
                return [];
            default:
                return [];
        }
    }

    takeDamage(amount, attacker) {
        const actualDamage = Math.max(1, amount);
        this.hp -= actualDamage;

        if (attacker.key === 'reaper') {
            const lifeSteal = Math.ceil(actualDamage * (0.01 + attacker.lifeStealMultiplier * 0.01));
            attacker.hp = Math.min(attacker.maxHp, attacker.hp + lifeSteal);
            attacker.lifeStealMultiplier = Math.min(10, attacker.lifeStealMultiplier + 1);
        }

        if (this.key === 'king') {
            this.hp = Math.min(this.maxHp, this.hp + (this.cfg.heal || 10));
        }

        if (attacker.key === 'viking') {
            attacker.spinSpeed *= 1.05;
        }

        if (attacker.key === 'wizard') {
            attacker.wizardChargeLevel = Math.min(5, attacker.wizardChargeLevel + 0.5);
            attacker.lastChargeTime = Date.now();
        }
    }
}

function distToSegment(px, py, x1, y1, x2, y2) {
    let l2 = (x2 - x1) ** 2 + (y2 - y1) ** 2;
    if (l2 == 0) return { d: Math.sqrt((px - x1) ** 2 + (py - y1) ** 2), cx: x1, cy: y1 };
    let t = Math.max(0, Math.min(1, ((px - x1) * (x2 - x1) + (py - y1) * (y2 - y1)) / l2));
    let cx = x1 + t * (x2 - x1);
    let cy = y1 + t * (y2 - y1);
    return { d: Math.sqrt((px - cx) ** 2 + (py - cy) ** 2), cx, cy };
}

function handleCollisions() {
    let dx = f2.x - f1.x;
    let dy = f2.y - f1.y;
    let dist = Math.sqrt(dx * dx + dy * dy);
    let combinedRadius = f1.size + f2.size;

    if (dist < combinedRadius) {
        let ang = Math.atan2(dy, dx);
        let push = (combinedRadius - dist) / 2;
        f1.x -= Math.cos(ang) * push;
        f1.y -= Math.sin(ang) * push;
        f2.x += Math.cos(ang) * push;
        f2.y += Math.sin(ang) * push;

        let knockForce = GLOBAL_CFG.mass / 5;
        f1.vx -= Math.cos(ang) * knockForce;
        f1.vy -= Math.sin(ang) * knockForce;
        f2.vx += Math.cos(ang) * knockForce;
        f2.vy += Math.sin(ang) * knockForce;

        f1.hp -= GLOBAL_CFG.bdmg;
        f2.hp -= GLOBAL_CFG.bdmg;

        if (f1.key === 'king') f1.hp = Math.min(f1.maxHp, f1.hp + (f1.cfg.heal || 10));
        if (f2.key === 'king') f2.hp = Math.min(f2.maxHp, f2.hp + (f2.cfg.heal || 10));

        if (f1.key === 'vanguard') {
            f2.vx += Math.cos(ang) * 15;
            f2.vy += Math.sin(ang) * 15;
        }
        if (f2.key === 'vanguard') {
            f1.vx -= Math.cos(ang) * 15;
            f1.vy -= Math.sin(ang) * 15;
        }
    }

    function resolveWeapon(attacker, defender) {
        let boxes = attacker.getHitboxes();
        for (let b of boxes) {
            let actualAngle = attacker.angle + b.offset;
            if (b.type === 'line') {
                let x1 = attacker.x + Math.cos(actualAngle) * attacker.size;
                let y1 = attacker.y + Math.sin(actualAngle) * attacker.size;
                let x2 = attacker.x + Math.cos(actualAngle) * b.l;
                let y2 = attacker.y + Math.sin(actualAngle) * b.l;
                let res = distToSegment(defender.x, defender.y, x1, y1, x2, y2);
                if (res.d < defender.size + b.w / 2) {
                    let impactAngle = Math.atan2(defender.y - res.cy, defender.x - res.cx);
                    let force = GLOBAL_CFG.mass * b.knock;
                    defender.vx += Math.cos(impactAngle) * force;
                    defender.vy += Math.sin(impactAngle) * force;
                    defender.takeDamage(b.dmg, attacker);
                    attacker.spinDir *= -1;
                    break;
                }
            } else if (b.type === 'point') {
                let px = attacker.x + Math.cos(actualAngle) * b.dist;
                let py = attacker.y + Math.sin(actualAngle) * b.dist;
                let pd = Math.sqrt((defender.x - px) ** 2 + (defender.y - py) ** 2);
                if (pd < defender.size + b.size / 2) {
                    let impactAngle = Math.atan2(defender.y - py, defender.x - px);
                    let force = GLOBAL_CFG.mass * b.knock;
                    defender.vx += Math.cos(impactAngle) * force;
                    defender.vy += Math.sin(impactAngle) * force;
                    defender.takeDamage(b.dmg, attacker);
                    attacker.spinDir *= -1;
                    break;
                }
            } else if (b.type === 'arc') {
                let angToDef = Math.atan2(defender.y - attacker.y, defender.x - attacker.x);
                let diff = Math.abs(angToDef - actualAngle);
                if (diff > Math.PI) diff = Math.PI * 2 - diff;
                let ddist = Math.sqrt((defender.x - attacker.x) ** 2 + (defender.y - attacker.y) ** 2);
                if (diff < (b.w * Math.PI / 180) && Math.abs(ddist - b.dist) < defender.size) {
                    let impactAngle = Math.atan2(defender.y - attacker.y, defender.x - attacker.x);
                    let force = GLOBAL_CFG.mass * b.knock;
                    defender.vx += Math.cos(impactAngle) * force;
                    defender.vy += Math.sin(impactAngle) * force;
                    defender.takeDamage(b.dmg, attacker);
                    attacker.spinDir *= -1;
                    break;
                }
            }
        }
    }

    resolveWeapon(f1, f2);
    resolveWeapon(f2, f1);

    // Berserker axes
    if (f1.key === 'berserker' && Date.now() - f1.lastThrowTime > 300) {
        f1.thrownAxes.push({ x: f1.x, y: f1.y, vx: (f2.x - f1.x) / Math.sqrt((f2.x - f1.x) ** 2 + (f2.y - f1.y) ** 2) * 600, vy: (f2.y - f1.y) / Math.sqrt((f2.x - f1.x) ** 2 + (f2.y - f1.y) ** 2) * 600, createdAt: Date.now() });
        f1.lastThrowTime = Date.now();
    }
    for (let axe of f1.thrownAxes) {
        let dist = Math.sqrt((f2.x - axe.x) ** 2 + (f2.y - axe.y) ** 2);
        if (dist < f2.size + 15) {
            let impactAngle = Math.atan2(f2.y - axe.y, f2.x - axe.x);
            f2.vx += Math.cos(impactAngle) * GLOBAL_CFG.mass * 3;
            f2.vy += Math.sin(impactAngle) * GLOBAL_CFG.mass * 3;
            f2.takeDamage(30, f1);
            f1.thrownAxes.splice(f1.thrownAxes.indexOf(axe), 1);
        }
    }

    if (f2.key === 'berserker' && Date.now() - f2.lastThrowTime > 300) {
        f2.thrownAxes.push({ x: f2.x, y: f2.y, vx: (f1.x - f2.x) / Math.sqrt((f1.x - f2.x) ** 2 + (f1.y - f2.y) ** 2) * 600, vy: (f1.y - f2.y) / Math.sqrt((f1.x - f2.x) ** 2 + (f1.y - f2.y) ** 2) * 600, createdAt: Date.now() });
        f2.lastThrowTime = Date.now();
    }
    for (let axe of f2.thrownAxes) {
        let dist = Math.sqrt((f1.x - axe.x) ** 2 + (f1.y - axe.y) ** 2);
        if (dist < f1.size + 15) {
            let impactAngle = Math.atan2(f1.y - axe.y, f1.x - axe.x);
            f1.vx += Math.cos(impactAngle) * GLOBAL_CFG.mass * 3;
            f1.vy += Math.sin(impactAngle) * GLOBAL_CFG.mass * 3;
            f1.takeDamage(30, f2);
            f2.thrownAxes.splice(f2.thrownAxes.indexOf(axe), 1);
        }
    }

    // Ninja shurikens
    if (f1.key === 'ninja' && Date.now() - f1.lastShurikenTime > 800) {
        for (let i = 0; i < 3; i++) {
            let angle = Math.atan2(f2.y - f1.y, f2.x - f1.x) + (i - 1) * 0.3;
            f1.shurikens.push({ x: f1.x, y: f1.y, vx: Math.cos(angle) * 400, vy: Math.sin(angle) * 400, createdAt: Date.now() });
        }
        f1.lastShurikenTime = Date.now();
    }
    f1.shurikens = f1.shurikens.filter(s => {
        s.x += s.vx * 0.016;
        s.y += s.vy * 0.016;
        if (Date.now() - s.createdAt > 1000) return false;
        if (s.x < 0 || s.x > canvas.width || s.y < 0 || s.y > canvas.height) return false;
        let dist = Math.sqrt((f2.x - s.x) ** 2 + (f2.y - s.y) ** 2);
        if (dist < f2.size + 10) {
            let impactAngle = Math.atan2(f2.y - s.y, f2.x - s.x);
            f2.vx += Math.cos(impactAngle) * GLOBAL_CFG.mass * 1.5;
            f2.vy += Math.sin(impactAngle) * GLOBAL_CFG.mass * 1.5;
            f2.takeDamage(8, f1);
            return false;
        }
        return true;
    });

    if (f2.key === 'ninja' && Date.now() - f2.lastShurikenTime > 800) {
        for (let i = 0; i < 3; i++) {
            let angle = Math.atan2(f1.y - f2.y, f1.x - f2.x) + (i - 1) * 0.3;
            f2.shurikens.push({ x: f2.x, y: f2.y, vx: Math.cos(angle) * 400, vy: Math.sin(angle) * 400, createdAt: Date.now() });
        }
        f2.lastShurikenTime = Date.now();
    }
    f2.shurikens = f2.shurikens.filter(s => {
        s.x += s.vx * 0.016;
        s.y += s.vy * 0.016;
        if (Date.now() - s.createdAt > 1000) return false;
        if (s.x < 0 || s.x > canvas.width || s.y < 0 || s.y > canvas.height) return false;
        let dist = Math.sqrt((f1.x - s.x) ** 2 + (f1.y - s.y) ** 2);
        if (dist < f1.size + 10) {
            let impactAngle = Math.atan2(f1.y - s.y, f1.x - s.x);
            f1.vx += Math.cos(impactAngle) * GLOBAL_CFG.mass * 1.5;
            f1.vy += Math.sin(impactAngle) * GLOBAL_CFG.mass * 1.5;
            f1.takeDamage(8, f2);
            return false;
        }
        return true;
    });

    // Monk teleport
    let now = Date.now();
    if (f1.key === 'monk' && now - f1.lastTeleportTime > 10000) {
        let angle = Math.atan2(f2.y - f1.y, f2.x - f1.x);
        let newX = f2.x - Math.cos(angle) * 150;
        let newY = f2.y - Math.sin(angle) * 150;
        if (newX > f1.size && newX < canvas.width - f1.size && newY > f1.size && newY < canvas.height - f1.size) {
            f1.x = newX;
            f1.y = newY;
            f1.lastTeleportTime = now;
        }
    }
    if (f2.key === 'monk' && now - f2.lastTeleportTime > 10000) {
        let angle = Math.atan2(f1.y - f2.y, f1.x - f2.x);
        let newX = f1.x - Math.cos(angle) * 150;
        let newY = f1.y - Math.sin(angle) * 150;
        if (newX > f2.size && newX < canvas.width - f2.size && newY > f2.size && newY < canvas.height - f2.size) {
            f2.x = newX;
            f2.y = newY;
            f2.lastTeleportTime = now;
        }
    }
}

function run() {
    ctx.fillStyle = "#0a0a1a";
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    // Grid
    ctx.strokeStyle = "#1a1a3a";
    ctx.lineWidth = 2;
    for (let i = 0; i < canvas.width; i += 70) {
        ctx.beginPath();
        ctx.moveTo(i, 0);
        ctx.lineTo(i, canvas.height);
        ctx.stroke();
    }
    for (let i = 0; i < canvas.height; i += 70) {
        ctx.beginPath();
        ctx.moveTo(0, i);
        ctx.lineTo(canvas.width, i);
        ctx.stroke();
    }

    if (matchActive && !isPaused) {
        handleCollisions();
        f1.update();
        f1.draw();
        f2.update();
        f2.draw();

        f1.hp = Math.min(f1.maxHp, f1.hp);
        f2.hp = Math.min(f2.maxHp, f2.hp);

        if (f1.hp <= 0 || f2.hp <= 0) {
            matchActive = false;
            let p1Wins = f1.hp > 0;
            announcer.innerText = p1Wins ? "RED VICTORIOUS" : "BLUE VICTORIOUS";
            announcer.style.color = p1Wins ? f1.cLight : f2.cLight;
        }
    } else if (matchActive && isPaused) {
        f1.draw();
        f2.draw();
    }

    requestAnimationFrame(run);
}

run();
</script>
